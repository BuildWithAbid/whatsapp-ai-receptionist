name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/whatsapp_ai_receptionist?schema=public
      NEXTAUTH_SECRET: 1234567890123456
      NEXTAUTH_URL: http://localhost:3000
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: token
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: whatsapp_ai_receptionist
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d whatsapp_ai_receptionist"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
