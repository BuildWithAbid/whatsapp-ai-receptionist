name: Bug report
description: Report a reproducible bug in the application or documentation
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, inputs, and environment details.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Submit ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste only non-sensitive information.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth
        - Dashboard
        - Settings
        - Webhook
        - AI logic
        - Database / Prisma
        - Docs
        - Deployment
    validations:
      required: true
